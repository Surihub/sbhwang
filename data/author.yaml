research_overview:
  ko: "AI 기반 형성적 평가와 통계 교육용 인터랙티브 도구 개발, 데이터 리터러시 및 통계적 추론 향상에 관심을 두고 연구하고 있습니다."
  en: "Focusing on AI-driven formative assessment in mathematics, development of interactive visualization tools for statistics education, and data literacy across learners."

